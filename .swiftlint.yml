# SwiftLint configuration for Husky Notes
# Starter config: pragmatic defaults plus a few opt-in rules.

included:
  - HuskyNotes

excluded:
  - build
  - DerivedData
  - .build
  - .swiftpm
  - "**/*.generated.swift"
  - HuskyNotes.xcodeproj

# A few high-value opt-in rules.
opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - empty_string
  - first_where
  - last_where
  - sorted_first_last
  - redundant_nil_coalescing
  - toggle_bool
  - unused_import
  - vertical_whitespace_closing_braces
  - explicit_init

disabled_rules:
  - todo            # We track TODOs intentionally during the planning phase.
  - trailing_comma  # Allow trailing commas for cleaner diffs.

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 150

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - r
    - g
    - b

cyclomatic_complexity:
  warning: 15
  error: 25

reporter: "xcode"
