name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    # macos-15 ships Xcode 16 (iOS 18 / macOS 15 SDKs), which the deployment
    # targets require. macos-latest can still be the older Xcode-15 image.
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: "generic/platform=iOS Simulator"
            scheme: HuskyNotes-iOS
          - platform: macOS
            destination: "platform=macOS"
            scheme: HuskyNotes-macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode (has the iOS 18 / macOS 15 SDKs)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project HuskyNotes.xcodeproj \
            -scheme "${{ matrix.scheme }}"

      - name: Build ${{ matrix.platform }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project HuskyNotes.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ matrix.destination }}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            | xcbeautify
