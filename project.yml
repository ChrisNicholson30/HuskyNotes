# XcodeGen spec for Husky Notes
# Generate the Xcode project with:  xcodegen generate
# (The generated HuskyNotes.xcodeproj is git-ignored.)
#
# One source folder (HuskyNotes/) feeds two app targets: iOS and macOS.
# v0.1 is LOCAL ONLY. CloudKit entitlements are present but commented;
# they get wired in v0.2.

name: HuskyNotes

# Base build settings shared by every target & config. Holds the signing team in
# one place (see Config/Signing.xcconfig) so the project builds under your own —
# or a fork's — Apple Developer account without per-target edits.
configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

options:
  bundleIdPrefix: com.huskynotes
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Shared Swift Package dependencies (apple/swift-markdown only).
packages:
  Markdown:
    url: https://github.com/apple/swift-markdown
    branch: main

# Settings applied to every target.
settingGroups:
  shared:
    base:
      SWIFT_VERSION: "6.0"
      SWIFT_STRICT_CONCURRENCY: complete
      ENABLE_USER_SCRIPT_SANDBOXING: YES
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: "Husky Notes"
      MARKETING_VERSION: "0.2.0"
      CURRENT_PROJECT_VERSION: "2"
      # Automatic signing; CI overrides with CODE_SIGNING_ALLOWED=NO.
      CODE_SIGN_STYLE: Automatic
      SWIFT_EMIT_LOC_STRINGS: YES
      # App icon from Assets.xcassets (populate via scripts/make-appicon.sh).
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # DEVELOPMENT_TEAM is set centrally in Config/Signing.xcconfig (above),
      # so every target — apps and extensions — signs under one team.

targets:
  # ---------------------------------------------------------------- iOS app
  HuskyNotes-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: HuskyNotes
      - path: Shared
    dependencies:
      - package: Markdown
        product: Markdown
      - target: HuskyNotes-ShareExtension
        embed: true
      - target: HuskyNotes-Widgets
        embed: true
    settings:
      groups:
        - shared
      base:
        PRODUCT_NAME: "Husky Notes"
        PRODUCT_BUNDLE_IDENTIFIER: com.huskynotes.app
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # iPad must support all four orientations (multitasking) unless full-screen-only.
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # Camera access for the document scanner (VNDocumentCameraViewController).
        INFOPLIST_KEY_NSCameraUsageDescription: "Husky Notes uses the camera to scan documents into your notes."
        # CloudKit + App Group entitlement (iOS-specific entitlements file).
        CODE_SIGN_ENTITLEMENTS: HuskyNotes/App/HuskyNotes-iOS.entitlements

  # ------------------------------------------------- iOS Share Extension
  HuskyNotes-ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ShareExtension
      - path: Shared
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ShareExtension/Info.plist
        PRODUCT_NAME: ShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.huskynotes.app.ShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "2"

  # ------------------------------------------------- iOS Widget Extension
  HuskyNotes-Widgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Widgets
      - path: Shared
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widgets/Info.plist
        PRODUCT_NAME: HuskyNotesWidgets
        PRODUCT_BUNDLE_IDENTIFIER: com.huskynotes.app.Widgets
        CODE_SIGN_ENTITLEMENTS: Widgets/Widgets.entitlements
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "2"

  # -------------------------------------------------------------- macOS app
  HuskyNotes-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: HuskyNotes
      - path: Shared
    dependencies:
      - package: Markdown
        product: Markdown
    settings:
      groups:
        - shared
      base:
        PRODUCT_NAME: "Husky Notes"
        PRODUCT_BUNDLE_IDENTIFIER: com.huskynotes.app.mac
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 CN-DESIGN LTD. Free and open source."
        # CloudKit: iCloud + CloudKit + App Sandbox (macOS-specific entitlements file).
        CODE_SIGN_ENTITLEMENTS: HuskyNotes/App/HuskyNotes-macOS.entitlements

# Shared schemes so both apps always have a buildable scheme (CI + local),
# independent of Xcode's on-demand scheme autocreation.
schemes:
  HuskyNotes-iOS:
    build:
      targets:
        HuskyNotes-iOS: all
    run:
      config: Debug
    archive:
      config: Release
  HuskyNotes-macOS:
    build:
      targets:
        HuskyNotes-macOS: all
    run:
      config: Debug
    archive:
      config: Release
  # The widget bundle vends two kinds (the configurable "New Note" widget and the
  # "New Note" Control), so debugging the extension scheme directly needs to know
  # which to preview. Pin a default `_XCWidgetKind`; flip the value to
  # `com.huskynotes.app.control.newnote` to preview the Control instead.
  # (Normal flow: run the HuskyNotes-iOS scheme and add the widget from the gallery.)
  HuskyNotes-Widgets:
    build:
      targets:
        HuskyNotes-Widgets: all
    run:
      config: Debug
      environmentVariables:
        - variable: _XCWidgetKind
          value: com.huskynotes.app.widget.newnote
          isEnabled: true

# Note on Resources: the `HuskyNotes/Resources` folder (including
# Themes/*.json and SampleNotes/*.md) is picked up by the recursive
# `sources` glob above and bundled as a copy-resources phase by XcodeGen,
# because .json / .md are non-source files.
